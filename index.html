<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoreBiz-Pro</title>
    
    <!-- Preconnect to Supabase Storage -->
    <link rel="preconnect" href="https://vymiwxuizkcvtgrobgro.supabase.co" />
    <link rel="dns-prefetch" href="https://vymiwxuizkcvtgrobgro.supabase.co" />

    <script>
      // Runtime Configuration Loader
      (function() {
        window.ENV = window.ENV || {};
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', false); // Synchronous to ensure config is loaded before app
        try {
          xhr.send(null);
          if (xhr.status === 200) {
            var config = JSON.parse(xhr.responseText);
            Object.assign(window.ENV, config);
          }
        } catch (e) {
          // Config file might not exist in dev or vercel env, relying on build-time env vars
          console.log('No runtime config found, using environment variables.');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
