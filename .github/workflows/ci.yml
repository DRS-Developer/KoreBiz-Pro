name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint
        # Dica: Rode 'npm run lint:fix' localmente para corrigir erros automaticamente

      - name: Type Check
        run: npm run check

      - name: Run Tests
        run: npm run test

      - name: Build Project
        run: npm run build
        env:
          # Variáveis dummy para permitir que o build passe no CI sem segredos reais
          VITE_SUPABASE_URL: "https://ci-placeholder.supabase.co"
          VITE_SUPABASE_ANON_KEY: "ci-placeholder-key"
